id: "Eğitimlerimize katılanlar ne dediler"

content:
  title: "Eğitimlerimize katılanlar ne dediler"

  featured:
    image: "images/testimonials-awards.png"
    text: "Uygulamalı biyoinformatik eğitimlerinde kavramların ve analiz adımlarının örneklerle işlenmesi öğrenme sürecini kolaylaştırdı. Zorlanılan noktalarda yazılı destek alınabilmesi de güven verdi."
    client: "Katılımcı geri bildirimi"

  list:
    - text: "Eğitimin en sevilen yönlerinden biri terminolojinin sade biçimde açıklanması ve komutların ayrıntılı anlatılmasıydı."
      client: "Katılımcı geri bildirimi"

    - text: "Uygulamaların ödevlerle pekiştirilmesi öğrenme sürecini güçlendiren noktalardan biri olarak öne çıktı."
      client: "Katılımcı geri bildirimi"

    - text: "Eğitimde uygulamaya önem verilmesi ve kaynakların düzenli paylaşılması öğrenme sürecini destekledi."
      client: "Katılımcı geri bildirimi"

    - text: "Uygulamalı yapı ve paylaşılan materyaller, konuları tekrar etmek isteyen katılımcılar için faydalı oldu."
      client: "Katılımcı geri bildirimi"
