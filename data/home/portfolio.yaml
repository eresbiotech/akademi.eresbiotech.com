  - image: "images/biyoinformatik-kursu.png"
    pretitle: "Kazanımlar"
    title: "Neden ERES Biyoinformatik Akademi?"
    text: "Sektör ve akademi deneyimiyle dinamik olan biyoinformatik alanında güncel ve uygulama odaklı eğitimler sunuyoruz. Canlı dersler ve asenkron öğrenme seçenekleriyle, kendi hızınıza göre öğrenme fırsatları sağlıyoruz. Uygulamalara dayalı yöntemlerle desteklenen derslerle kalıcı öğrenmeyi güçlendirmeyi amaçlıyoruz."

    buttons: 
      - label: "İşimiz nedir"
        url: "/work"

  - image: "images/Biyoinformatik-dersleri.png"
    pretitle: "Eğitim patikası"
    title: "Kendi yolunuzu çizebileceğiniz eğitimlerimiz"
    text: "Kendi uzmanlaşma yolunuzu biçimlendirebileceğiniz biyoinformatik eğitimlerimizle, stressiz ve kişiselleştirilmiş bir öğrenme deneyimi yaşayabilirsiniz. Giriş seviyesinden ileri seviyeye kadar olan gelişim patikaları, ihtiyaçlarınıza uygun şekilde şekillenebilir tasarlanmıştır. Biyoinformatiğe Giriş, NCBI, Ensemble, Veri Tabanları, Yüksek Hacimli Veriler ve Biyoinformatik, Yapısal Biyoloji ve Protein Modelleme, Filogenetik Analizler, Tek Hücreli RNA Analizi, R ve Biyoinformatik konularında sunulan eğitimlerimiz, her biri teorik ve pratik bileşenleri içeren kapsamlı içeriklere sahiptir."
