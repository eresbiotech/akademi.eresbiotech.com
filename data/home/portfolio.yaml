    title: "ERES Biyoinformatik Akademi: Biyoinformatik Yolculuğunuzda Yanınızdayız"
    text: "Biyoinformatiğe başlamak ve uzmanlaşmak isteyen akademisyenler, akademisyen adayları, biyoloji, biyoteknoloji, biyomedikal, tıp ve sağlık bilimleri, veterinerlik, ziraat gibi alanlardaki profesyoneller için uygulama odaklı online eğitimler sunuyoruz. Canlı dersler ve asenkron öğrenme seçenekleriyle esnek bir öğrenme ortamı sağlarken, sertifikalar ve pratiğe dayalı projelerle öğrenme çıktılarınızı görünür kılmayı hedefliyoruz."

