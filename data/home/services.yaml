enabled: true
id: "services"

content:
  title: "Biyoinformatik Eğitimleri"
  text: "Biyoinformatik, veri analizi ve hesaplamalı biyoloji alanlarında kendi hızınızda ilerleyebileceğiniz videolu ve uygulama odaklı eğitimleri keşfedin."
  cards:

    - image: "images/biyoinformatik-kis-donemi.png"
      title: "Biyoinformatik Başlangıç Dersi"
      text: "Biyoinformatiğin temel kavramlarını, örnek çalışmalarını ve uygulama alanlarını kendi hızınızda öğrenmeye başlayabileceğiniz giriş düzeyi bir derstir."
      button:
        label: "İncele"
        url: "post/kis-egitim"

    - image: "images/Uygulamali-R-Egitimi.png"
      title:  "Uygulamalı <br/> R'a Giriş Eğitimi"
      text: "R programlama dilini kullanarak temel istatistiksel analiz, veri düzenleme ve görselleştirme becerilerinizi uygulamalı örneklerle geliştirin."
      button:
        label: "İncele"
        url: "post/uygulamali-r"

    - image: "images/Biyoinformatik-Genomik-Proteomik-Büyük-Veri-Egitimi.png"
      title: "Biyoinformatiğe Giriş ve Biyoinformatikte Büyük Veri Eğitimi"
      text: "Biyoinformatik temel kavramlarını, omik veri türlerini, büyük veri yaklaşımını ve hesaplamalı analiz mantığını adım adım öğrenin."
      button:
        label: "İncele"
        url: "post/biyoinformatik-giris-egitim-buyuk-veri-kurs"

    - image: "images/Biyoinformatikte-Dizi-Hizalama-Algoritmalar-Egitimi.png"
      title: "Biyoinformatikte Dizi Hizalama ve Algoritmalar Eğitimi"
      text: "Dizi hizalama tekniklerini, algoritmik düşünmeyi ve biyolojik dizilerin karşılaştırılmasına yönelik temel yaklaşımları uygulamalarla öğrenin."
      button:
        label: "İncele"
        url: "post/biyoinformatik-dizi-hizalama-algoritmalari-egitimi"
    - image: "images/Biyoinformatik-Araclar-Veritabanlari-Egitimi.png"
      title: "Temel Biyoinformatik Araçlar ve Veritabanları Eğitimi "
      text: "DNA, RNA ve protein dizileriyle çalışırken kullanılan temel araçları, veri türlerini, BLAST, ClustalW, GenBank, UniProt ve PDB gibi kaynakları tanıyın."
      button:
        label: "İncele"
        url: "post/biyoinformatik-veritabanlari-araclar-egitimi"

    - image: "images/NCBI-ENSEMBL-UCSC-Genom-Tarayicileri-Kursu.png"
      title: "NCBI, ENSEMBL ve UCSC Genom Tarayıcıları Uygulamalı Eğitimi"
      text: "NCBI, Ensembl ve UCSC Genome Browser araçlarını karşılaştırmalı örneklerle tanıyın; genomik veri erişimi ve yorumlama becerilerinizi geliştirin."
      button:
        label: "İncele"
        url: "post/ncbi-ensembl-ucsc-genom-tarayicisi-uygulamali-egitim"

    - image: "images/Filogenetik-dizi-hizalama-Egitimi.png"
      title: "phyML uygulamalı Filogenetik ve dizi hizalama Eğitimi"
      text: "Dizi hizalama ve filogenetik ilişkiyi, phyML uygulamalarını, evrimsel modelleri ve filogenetik ağaç yorumlamayı uygulamalı olarak öğrenin."
      button:
        label: "İncele"
        url: "post/phyml-uygulamali-filogenetik-egitimi"
    - image: "images/uygulamali-Yapisal-Biyoinformatik-in-silico-Protein-Modelleme-Egitimi.png"
      title: "Uygulamalı Yapısal Biyoinformatik ve in silico Protein Modelleme Eğitimi"
      text: "Homoloji modelleme, protein fonksiyon tahmini, ilaç keşfi yaklaşımı, SWISS-MODEL ve AutoDock Vina gibi araçların kullanımını adım adım öğrenin."
      button:
        label: "İncele"
        url: "post/uygulamali_yapisal_biyoinformatik_ve_in_silico_protein_modelleme"

    - image: "images/Tek-Hucre-RNA-Seq-dizi-Analizi-Egitimi.png"
      title: "Tek Hücre RNA-Seq Analizi Eğitimi"
      text: "Hücresel heterojenite, scRNA-seq, boyut azaltma, kümeleme, diferansiyel ekspresyon analizi ve Seurat tabanlı uygulamaları öğrenin."
      button:
        label: "İncele"
        url: "post/tek-hucre-rna-seq-analizi-egitimi"

    - image: "images/Yeni-Nesil-Dizileme-DNA-Verileri-NGS-Kursu.png"
      title: "Yeni Nesil Dizileme Verileri ve NGS ile Çalışma Eğitimi"
      text: "Yeni nesil dizileme teknolojilerinin temel prensiplerini, kalite kontrol yaklaşımını, Galaxy platformunu ve NGS veri yorumlamayı uygulamalarla öğrenin."
      button:
        label: "İncele"
        url: "post/yeni-nesil-dizileme-kursu"
    - image: "images/Biyoinformatik-Yaz-Kampi-Kurs.png"
      title: "Biyoinformatik Yaz Kampı"
      text: "Biyoinformatik Yaz Kampı, R programlama, veri analizi, dizi hizalama, yapısal biyoinformatik, filogenetik analiz, tek hücre RNA-seq ve NGS konularını bütüncül bir öğrenme patikasında bir araya getirir."
      button:
        label: "İncele"
        url: "post/biyoinformatik-yaz-kampi"

    - image: "images/Biyoinformatik-Kis-Kampi.png"
      title: "Biyoinformatik Kış Kampı"
      text: "Biyoinformatik Kış Kampı, temel kavramlardan uygulamalı analiz süreçlerine uzanan kapsamlı bir öğrenme deneyimi sunar; katılımcıların biyoinformatik araçları ve veri analizi yaklaşımını sistematik biçimde geliştirmesine yardımcı olur."
      button:
        label: "İncele"
        url: "post/biyoinformatik-kis-kampi"
